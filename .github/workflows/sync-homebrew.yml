name: Sync to Homebrew Tap

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  sync:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out source repo
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          path: source

      - name: Resolve release tag
        id: release
        working-directory: source
        run: |
          TAG=$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | grep '^v' | head -n 1)
          if [ -z "$TAG" ]; then
            echo "No release tag found for commit ${{ github.event.workflow_run.head_sha }}"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check out tap repo
        uses: actions/checkout@v5
        with:
          repository: librefang/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Download and calculate checksums
        id: assets
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          curl -sL "https://api.github.com/repos/librefang/librefang/releases/tags/$TAG" > releases.json

          # Get checksums
          for url in $(cat releases.json | jq -r '.assets[] | select(.name | endswith(".tar.gz") or endswith(".zip")) | .browser_download_url'); do
            sha=$(curl -sL "$url" | sha256sum | cut -d' ' -f1)
            echo "$url $sha" >> tap/checksums.txt
          done

          cat tap/checksums.txt

      - name: Generate formula
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="${TAG#v}"

          # Read checksums
          ARM64_DARWIN_SHA=$(grep "aarch64-apple-darwin" tap/checksums.txt | awk '{print $2}')
          X86_DARWIN_SHA=$(grep "x86_64-apple-darwin" tap/checksums.txt | awk '{print $2}')
          ARM64_LINUX_SHA=$(grep "aarch64-unknown-linux-gnu" tap/checksums.txt | awk '{print $2}')
          X86_LINUX_SHA=$(grep "x86_64-unknown-linux-gnu" tap/checksums.txt | awk '{print $2}')

          ARM64_DARWIN_URL=$(grep "aarch64-apple-darwin" tap/checksums.txt | awk '{print $1}')
          X86_DARWIN_URL=$(grep "x86_64-apple-darwin" tap/checksums.txt | awk '{print $1}')
          ARM64_LINUX_URL=$(grep "aarch64-unknown-linux-gnu" tap/checksums.txt | awk '{print $1}')
          X86_LINUX_URL=$(grep "x86_64-unknown-linux-gnu" tap/checksums.txt | awk '{print $1}')

          cat > tap/Formula/librefang.rb <<EOF
          class Librefang < Formula
            desc "Community-Maintained Agent Operating System written in Rust"
            homepage "https://librefang.ai"
            license "MIT"
            version "$VERSION"

            on_macos do
              if Hardware::CPU.arm?
                url "$ARM64_DARWIN_URL"
                sha256 "$ARM64_DARWIN_SHA"
              else
                url "$X86_DARWIN_URL"
                sha256 "$X86_DARWIN_SHA"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "$ARM64_LINUX_URL"
                sha256 "$ARM64_LINUX_SHA"
              else
                url "$X86_LINUX_URL"
                sha256 "$X86_LINUX_SHA"
              end
            end

            def install
              bin.install "librefang"
            end

            test do
              system "#{bin}/librefang", "--version"
            end
          end
          EOF

          cat tap/Formula/librefang.rb

      - name: Commit and push
        working-directory: tap
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "chore: update formula to ${{ steps.release.outputs.tag }}" || echo "No changes"
          git push
